# UniSigma: backend + frontend (static)
# After first deploy, set VITE_API_URL on the static site to your backend URL
# (e.g. https://unisigma-api.onrender.com) and FRONTEND_ORIGIN on the backend to your static site URL.

services:
  # Backend API (SQLite and uploads use ephemeral storage; data does not persist across deploys)
  - type: web
    runtime: python
    name: unisigma-api
    rootDir: backend
    buildCommand: uv sync
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false

  # Frontend static site
  - type: web
    runtime: static
    name: unisigma
    rootDir: frontend
    buildCommand: bun run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
