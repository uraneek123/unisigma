# UniSigma: backend + frontend (static) — free tier
# Backend: plan free (spins down after 15 min inactivity, 750 instance hrs/mo, ephemeral disk).
# Static site: free. After first deploy, set VITE_API_URL and FRONTEND_ORIGIN in the dashboard.

services:
  # Backend API (free plan: spin-down when idle, ephemeral SQLite + uploads)
  - type: web
    runtime: python
    name: unisigma-api
    plan: free
    rootDir: backend
    buildCommand: uv sync
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false

  # Frontend static site
  - type: web
    runtime: static
    name: unisigma
    rootDir: frontend
    buildCommand: bun run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
